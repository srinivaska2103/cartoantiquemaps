<!DOCTYPE html>
<html lang="en" x-data="comingSoonApp()" :dir="direction" :class="{ 'dark': darkMode }">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Expanding the Horizon | CartoAntique</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            overflow: hidden; 
            touch-action: none;
        }
        [x-cloak] { display: none !important; }
        .view-container { height: 100dvh; }
        
        .pulse-slow {
            animation: pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(1.1); }
        }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#EAB308',
                        secondary: '#A16207',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 transition-colors duration-300">

    <!-- Top Bar -->
    <header class="fixed top-0 w-full z-50 px-4 md:px-8 py-4 flex justify-between items-center bg-slate-50/80 dark:bg-slate-950/80 backdrop-blur-sm">
        <a href="index.html">
                                 <div class="flex items-center gap-3 group cursor-pointer">
    <!-- Compass Rose Logo -->
    <div class="relative w-12 h-12 bg-primary rounded-xl flex items-center justify-center shadow-lg shadow-primary/20 transform group-hover:rotate-12 transition-transform duration-500">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <path d="M16.24 7.76l-2.12 6.36-6.36 2.12 2.12-6.36 6.36-2.12z"/>
            <path d="M12 2v2M12 20v2M2 12h2M20 12h2"/>
        </svg>
        <!-- Decorative inner ring -->
        <div class="absolute inset-1 border border-white/30 rounded-lg"></div>
    </div>
    
    <!-- Text Logo -->
    <div class="flex flex-col leading-tight">
        <span class="text-2xl font-extrabold tracking-tight text-slate-900 dark:text-white group-hover:text-primary transition-colors">
            Carto<span class="text-primary">Antique</span>
        </span>
      
    </div>
</div>
                 </a>

        <div class="flex items-center gap-2">
            <button @click="toggleDir()" class="p-2 rounded-lg bg-white dark:bg-slate-800 shadow-sm font-bold text-[10px] border border-slate-200 dark:border-slate-700">
                <span x-text="direction.toUpperCase()"></span>
            </button>
            <button @click="toggleTheme()" class="p-2 rounded-lg bg-white dark:bg-slate-800 shadow-sm border border-slate-200 dark:border-slate-700">
                <template x-if="!darkMode">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" stroke-width="2"></path></svg>
                </template>
                <template x-if="darkMode">
                    <svg class="w-5 h-5 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707" stroke-width="2"></path></svg>
                </template>
            </button>
        </div>
    </header>

    <main class="view-container flex flex-col justify-center items-center px-4 relative">
        <!-- Background Radial Gradient -->
        <div class="absolute inset-0 pulse-slow bg-gradient-to-tr from-primary/20 via-transparent to-secondary/10 pointer-events-none"></div>

        <div class="relative z-10 text-center max-w-[600px] scale-90 sm:scale-100 transition-transform">
            <span class="inline-block px-4 py-1.5 mb-6 text-xs font-bold tracking-[0.3em] uppercase bg-primary text-white rounded-full shadow-lg">
                Under Exploration
            </span>
            
            <h1 class="text-4xl md:text-6xl font-bold mb-6 leading-tight">
                Expanding the <span class="text-primary">Horizon</span>
            </h1>
            
            <p class="text-slate-600 dark:text-slate-400 text-sm md:text-lg mb-10 font-medium leading-relaxed">
                Our master cartographers are currently indexing a rare 18th-century private collection. We will return shortly with uncharted treasures.
            </p>

            <!-- Countdown Timer -->
            <div class="flex justify-center gap-3 md:gap-6 mb-12" x-data="timer()">
                <div class="flex flex-col">
                    <span class="text-2xl md:text-4xl font-bold" x-text="days">00</span>
                    <span class="text-[10px] uppercase font-bold text-slate-400 tracking-widest">Days</span>
                </div>
                <div class="text-2xl md:text-4xl font-bold text-primary">:</div>
                <div class="flex flex-col">
                    <span class="text-2xl md:text-4xl font-bold" x-text="hours">00</span>
                    <span class="text-[10px] uppercase font-bold text-slate-400 tracking-widest">Hours</span>
                </div>
                <div class="text-2xl md:text-4xl font-bold text-primary">:</div>
                <div class="flex flex-col">
                    <span class="text-2xl md:text-4xl font-bold" x-text="minutes">00</span>
                    <span class="text-[10px] uppercase font-bold text-slate-400 tracking-widest">Mins</span>
                </div>
            </div>

            <!-- Notify Form -->
            <div x-data="{ sent: false }">
                <form x-show="!sent" @submit.prevent="sent = true" class="flex flex-col sm:flex-row gap-3">
                    <input type="email" placeholder="Enter your email address" required
                        class="flex-1 px-6 py-4 rounded-2xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 focus:ring-2 focus:ring-primary outline-none text-sm transition-all shadow-sm">
                    <button type="submit" class="px-8 py-4 bg-primary hover:bg-secondary text-white font-bold rounded-2xl shadow-xl shadow-primary/20 transition-all active:scale-95 whitespace-nowrap">
                        Notify Me
                    </button>
                </form>
                
                <div x-show="sent" x-cloak class="p-4 bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-800 rounded-2xl flex items-center justify-center gap-3">
                    <svg class="w-5 h-5 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                    <span class="font-bold text-green-700 dark:text-green-400">You're on the list!</span>
                </div>
            </div>
        </div>

       
    </main>

    <script>
        function comingSoonApp() {
            return {
                darkMode: localStorage.getItem('dark') === 'true',
                direction: localStorage.getItem('dir') || 'ltr',
                toggleTheme() {
                    this.darkMode = !this.darkMode;
                    localStorage.setItem('dark', this.darkMode);
                },
                toggleDir() {
                    this.direction = this.direction === 'ltr' ? 'rtl' : 'ltr';
                    localStorage.setItem('dir', this.direction);
                }
            }
        }

        function timer() {
            return {
                days: '14',
                hours: '08',
                minutes: '42',
                init() {
                    // Logic for real-time countdown could go here
                }
            }
        }
    </script>
</body>
</html>
