<!DOCTYPE html>
<html lang="en" x-data="errorApp()" :dir="direction" :class="{ 'dark': darkMode }">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>404 - Lost at Sea | CartoAntique</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            overflow: hidden; 
            touch-action: none;
        }
        [x-cloak] { display: none !important; }
        .error-view { height: 100dvh; }
        
        .float-animation {
            animation: floating 6s ease-in-out infinite;
        }
        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#EAB308',
                        secondary: '#A16207',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 transition-colors duration-300">

    <!-- Top Bar -->
    <header class="fixed top-0 w-full z-50 px-4 md:px-8 py-4 flex justify-between items-center bg-slate-50/80 dark:bg-slate-950/80 backdrop-blur-sm">
       <a href="index.html">
                                 <div class="flex items-center gap-3 group cursor-pointer">
    <!-- Compass Rose Logo -->
    <div class="relative w-12 h-12 bg-primary rounded-xl flex items-center justify-center shadow-lg shadow-primary/20 transform group-hover:rotate-12 transition-transform duration-500">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <path d="M16.24 7.76l-2.12 6.36-6.36 2.12 2.12-6.36 6.36-2.12z"/>
            <path d="M12 2v2M12 20v2M2 12h2M20 12h2"/>
        </svg>
        <!-- Decorative inner ring -->
        <div class="absolute inset-1 border border-white/30 rounded-lg"></div>
    </div>
    
    <!-- Text Logo -->
    <div class="flex flex-col leading-tight">
        <span class="text-2xl font-extrabold tracking-tight text-slate-900 dark:text-white group-hover:text-primary transition-colors">
            Carto<span class="text-primary">Antique</span>
        </span>
      
    </div>
</div>
                 </a>

        <div class="flex items-center gap-2">
            <button @click="toggleDir()" class="p-2 rounded-lg bg-white dark:bg-slate-800 shadow-sm font-bold text-[10px] border border-slate-200 dark:border-slate-700">
                <span x-text="direction.toUpperCase()"></span>
            </button>
            <button @click="toggleTheme()" class="p-2 rounded-lg bg-white dark:bg-slate-800 shadow-sm border border-slate-200 dark:border-slate-700">
                <template x-if="!darkMode">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" stroke-width="2"></path></svg>
                </template>
                <template x-if="darkMode">
                    <svg class="w-5 h-5 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707" stroke-width="2"></path></svg>
                </template>
            </button>
        </div>
    </header>

    <main class="error-view flex flex-col justify-center items-center px-4 relative">
        <!-- Background Decorative SVG -->
        <div class="absolute inset-0 opacity-[0.03] dark:opacity-[0.05] pointer-events-none flex items-center justify-center">
            <svg class="w-[80%] h-auto float-animation" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                <path fill="currentColor" d="M44.7,-76.4C58.8,-69.2,71.8,-59.1,79.6,-45.8C87.4,-32.6,90,-16.3,88.5,-0.9C87,14.6,81.4,29.1,72.6,41.4C63.8,53.7,51.8,63.8,38.3,71.5C24.8,79.2,9.8,84.5,-4.7,82.7C-19.2,80.9,-33.2,71.9,-45.1,62.2C57,52.5,-66.7,42.1,-73.5,29.3C-80.3,16.5,-84.2,1.3,-82.1,-13.4C-80.1,-28.1,-72.1,-42.2,-60.7,-50.2C-49.3,-58.2,-34.5,-60.1,-21.4,-68C-8.3,-75.9,3.1,-89.7,18.7,-83.6C34.3,-77.5,30.6,-83.6,44.7,-76.4Z" transform="translate(100 100)" />
            </svg>
        </div>

        <!-- Error Content -->
        <div class="relative z-10 text-center max-w-[500px] scale-90 sm:scale-100 transition-transform">
            <h1 class="text-[120px] md:text-[180px] font-extrabold leading-none text-primary/20 dark:text-primary/10 select-none">
                404
            </h1>
            
            <div class="mt-[-40px] md:mt-[-60px]">
                <h2 class="text-3xl md:text-5xl font-bold mb-4">Lost at Sea?</h2>
                <p class="text-slate-600 dark:text-slate-400 text-sm md:text-lg mb-10 font-medium leading-relaxed">
                    The coordinates you followed seem to lead to uncharted waters. This page has either been moved to another archive or never existed in our records.
                </p>
                
                <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
                    <a href="index.html" class="w-full sm:w-auto px-10 py-4 bg-primary hover:bg-secondary text-white font-bold rounded-2xl shadow-xl shadow-primary/20 transition-all active:scale-95 flex items-center justify-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" stroke-width="2"></path></svg>
                        Return to Port
                    </a>
                    <a href="contact.html" class="w-full sm:w-auto px-10 py-4 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 font-bold rounded-2xl transition-all hover:bg-slate-50 dark:hover:bg-slate-700">
                        Report a Drift
                    </a>
                </div>
            </div>
        </div>

        <!-- Compass Decoration -->
        <div class="absolute bottom-10 opacity-10 animate-spin-slow pointer-events-none">
            <svg class="w-32 h-32 md:w-48 md:h-48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="0.5">
                <circle cx="12" cy="12" r="10" />
                <path d="M12 2v20M2 12h20M16.24 7.76l-8.48 8.48M7.76 7.76l8.48 8.48" />
            </svg>
        </div>
    </main>

    <script>
        function errorApp() {
            return {
                darkMode: localStorage.getItem('dark') === 'true',
                direction: localStorage.getItem('dir') || 'ltr',
                toggleTheme() {
                    this.darkMode = !this.darkMode;
                    localStorage.setItem('dark', this.darkMode);
                },
                toggleDir() {
                    this.direction = this.direction === 'ltr' ? 'rtl' : 'ltr';
                    localStorage.setItem('dir', this.direction);
                }
            }
        }
    </script>
    <style>
        .animate-spin-slow {
            animation: spin 20s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</body>
</html>
